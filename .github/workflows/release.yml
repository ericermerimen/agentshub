name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build and package universal app bundle
        run: ./Scripts/package_app.sh --release --universal

      - name: Create tarball
        run: |
          # Include LICENSE so Homebrew sees multiple top-level entries and doesn't strip the .app
          mkdir -p pkg
          cp -r AgentPing.app pkg/
          cp LICENSE pkg/
          tar -czf AgentPing-${{ github.ref_name }}-macos.tar.gz -C pkg AgentPing.app LICENSE
          cp AgentPing.app/Contents/MacOS/agentping agentping-cli
          tar -czf agentping-cli-${{ github.ref_name }}-macos.tar.gz agentping-cli

      - name: Compute SHA256
        id: sha
        run: |
          echo "app_sha=$(shasum -a 256 AgentPing-${{ github.ref_name }}-macos.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "cli_sha=$(shasum -a 256 agentping-cli-${{ github.ref_name }}-macos.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            AgentPing-${{ github.ref_name }}-macos.tar.gz
            agentping-cli-${{ github.ref_name }}-macos.tar.gz
          body: |
            ## Install

            **One-line install (recommended):**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/ericermerimen/agentshub/main/Scripts/install-remote.sh | bash
            ```

            **Homebrew:**
            ```bash
            brew install ericermerimen/tap/agentping
            ```

            **Manual download:**
            ```bash
            tar xzf AgentPing-${{ github.ref_name }}-macos.tar.gz
            cp -r AgentPing.app /Applications/
            ln -sf /Applications/AgentPing.app/Contents/MacOS/agentping /usr/local/bin/agentping
            ```

            ## SHA256 checksums
            - `AgentPing-${{ github.ref_name }}-macos.tar.gz`: `${{ steps.sha.outputs.app_sha }}`
            - `agentping-cli-${{ github.ref_name }}-macos.tar.gz`: `${{ steps.sha.outputs.cli_sha }}`

      - name: Update Homebrew tap formula
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        if: env.TAP_TOKEN != ''
        run: |
          VERSION="${{ github.ref_name }}"
          SHA="${{ steps.sha.outputs.app_sha }}"
          URL="https://github.com/ericermerimen/agentshub/releases/download/${VERSION}/AgentPing-${VERSION}-macos.tar.gz"

          # Clone the tap repo
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/ericermerimen/homebrew-tap.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          mkdir -p Formula

          # Generate updated formula
          cat > Formula/agentping.rb << FORMULA
          class Agentping < Formula
            desc "macOS menu bar app for monitoring Claude Code sessions"
            homepage "https://github.com/ericermerimen/agentshub"
            url "${URL}"
            sha256 "${SHA}"

            depends_on :macos
            depends_on macos: :sonoma

            def install
              prefix.install "AgentPing.app"
              bin.install_symlink prefix/"AgentPing.app/Contents/MacOS/agentping"
            end

            def caveats
              <<~EOS
                AgentPing.app has been installed to:
                  #{prefix}/AgentPing.app

                To start the menu bar app:
                  open #{prefix}/AgentPing.app

                To set up Claude Code hooks, open AgentPing preferences
                and click "Copy Hook Config to Clipboard", then paste
                into ~/.claude/settings.json

                You may need to grant Accessibility access in:
                  System Settings > Privacy & Security > Accessibility
              EOS
            end

            service do
              run [opt_prefix/"AgentPing.app/Contents/MacOS/AgentPingApp"]
              keep_alive true
              log_path var/"log/agentping.log"
              error_log_path var/"log/agentping-error.log"
            end
          end
          FORMULA

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/agentping.rb
          git commit -m "Update agentping to ${VERSION}" || true
          git push
