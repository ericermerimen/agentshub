name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build and package universal app bundle
        run: ./Scripts/package_app.sh --release --universal

      - name: Create tarball
        run: |
          tar -czf AgentsHub-${{ github.ref_name }}-macos.tar.gz AgentsHub.app
          cp AgentsHub.app/Contents/MacOS/agentshub agentshub-cli
          tar -czf agentshub-cli-${{ github.ref_name }}-macos.tar.gz agentshub-cli

      - name: Compute SHA256
        id: sha
        run: |
          echo "app_sha=$(shasum -a 256 AgentsHub-${{ github.ref_name }}-macos.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "cli_sha=$(shasum -a 256 agentshub-cli-${{ github.ref_name }}-macos.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            AgentsHub-${{ github.ref_name }}-macos.tar.gz
            agentshub-cli-${{ github.ref_name }}-macos.tar.gz
          body: |
            ## Install

            **One-line install (recommended):**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/ericermerimen/agentshub/main/Scripts/install-remote.sh | bash
            ```

            **Homebrew:**
            ```bash
            brew install ericermerimen/tap/agentshub
            ```

            **Manual download:**
            ```bash
            tar xzf AgentsHub-${{ github.ref_name }}-macos.tar.gz
            cp -r AgentsHub.app /Applications/
            ln -sf /Applications/AgentsHub.app/Contents/MacOS/agentshub /usr/local/bin/agentshub
            ```

            ## SHA256 checksums
            - `AgentsHub-${{ github.ref_name }}-macos.tar.gz`: `${{ steps.sha.outputs.app_sha }}`
            - `agentshub-cli-${{ github.ref_name }}-macos.tar.gz`: `${{ steps.sha.outputs.cli_sha }}`

      - name: Update Homebrew tap formula
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        if: env.TAP_TOKEN != ''
        run: |
          VERSION="${{ github.ref_name }}"
          SHA="${{ steps.sha.outputs.app_sha }}"
          URL="https://github.com/ericermerimen/agentshub/releases/download/${VERSION}/AgentsHub-${VERSION}-macos.tar.gz"

          # Clone the tap repo
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/ericermerimen/homebrew-tap.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          mkdir -p Formula

          # Generate updated formula
          cat > Formula/agentshub.rb << FORMULA
          class Agentshub < Formula
            desc "macOS menu bar app for monitoring Claude Code sessions"
            homepage "https://github.com/ericermerimen/agentshub"
            url "${URL}"
            sha256 "${SHA}"

            depends_on :macos
            depends_on macos: :sonoma

            def install
              prefix.install "AgentsHub.app"
              bin.install_symlink prefix/"AgentsHub.app/Contents/MacOS/agentshub"
            end

            def caveats
              <<~EOS
                AgentsHub.app has been installed to:
                  #{prefix}/AgentsHub.app

                To start the menu bar app:
                  open #{prefix}/AgentsHub.app

                To set up Claude Code hooks, open AgentsHub preferences
                and click "Copy Hook Config to Clipboard", then paste
                into ~/.claude/settings.json

                You may need to grant Accessibility access in:
                  System Settings > Privacy & Security > Accessibility
              EOS
            end

            service do
              run "#{prefix}/AgentsHub.app/Contents/MacOS/AgentsHubApp"
              keep_alive true
              log_path var/"log/agentshub.log"
              error_log_path var/"log/agentshub-error.log"
            end
          end
          FORMULA

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/agentshub.rb
          git commit -m "Update agentshub to ${VERSION}" || true
          git push
